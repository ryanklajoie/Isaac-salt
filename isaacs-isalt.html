<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Isaac's iSalt</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0e0c;
    --surface: #1a1916;
    --border: #2e2c28;
    --accent: #e8c547;
    --accent2: #c4773a;
    --text: #f0ece0;
    --muted: #7a7568;
    --danger: #c45a5a;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    background-image: 
      radial-gradient(ellipse at 20% 50%, rgba(196, 119, 58, 0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(232, 197, 71, 0.05) 0%, transparent 50%);
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2.5rem;
    width: 100%;
    max-width: 480px;
    box-shadow: 0 24px 60px rgba(0,0,0,0.5);
  }

  .header {
    margin-bottom: 2.5rem;
    border-bottom: 1px solid var(--border);
    padding-bottom: 1.5rem;
  }

  .label-tag {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: var(--accent2);
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3rem;
    line-height: 1;
    letter-spacing: 0.05em;
    color: var(--text);
  }

  h1 span { color: var(--accent); }

  .subtitle {
    font-size: 0.72rem;
    color: var(--muted);
    margin-top: 0.5rem;
    letter-spacing: 0.05em;
  }

  .section { margin-bottom: 1.5rem; }

  .field-label {
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 0.5rem;
    display: block;
  }

  .input-row {
    display: flex;
    gap: 0.5rem;
  }

  input[type="number"], input[type="text"] {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 1.1rem;
    padding: 0.7rem 1rem;
    flex: 1;
    outline: none;
    transition: border-color 0.2s;
    -moz-appearance: textfield;
    width: 100%;
  }

  input[type="number"]::-webkit-outer-spin-button,
  input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }

  input[type="number"]:focus, input[type="text"]:focus { border-color: var(--accent); }

  .toggle {
    display: flex;
    border: 1px solid var(--border);
    border-radius: 3px;
    overflow: hidden;
    flex-shrink: 0;
  }

  .toggle button {
    background: var(--bg);
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    padding: 0.7rem 1rem;
    transition: background 0.15s, color 0.15s;
    text-transform: uppercase;
  }

  .toggle button.active {
    background: var(--accent);
    color: #000;
    font-weight: 500;
  }

  /* Presets area */
  .presets-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.5rem;
  }

  .presets-label {
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .add-preset-btn {
    background: transparent;
    border: 1px solid var(--accent2);
    border-radius: 2px;
    color: var(--accent2);
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    padding: 0.2rem 0.5rem;
    text-transform: uppercase;
    transition: all 0.15s;
  }

  .add-preset-btn:hover { background: var(--accent2); color: #000; }

  .presets {
    display: flex;
    gap: 0.4rem;
    flex-wrap: wrap;
  }

  .preset-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--muted);
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.08em;
    padding: 0.3rem 0.6rem;
    transition: all 0.15s;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 0.3rem;
  }

  .preset-btn:hover { border-color: var(--accent2); color: var(--accent2); }
  .preset-btn.active-preset { border-color: var(--accent); color: var(--accent); }

  .preset-delete {
    color: var(--danger);
    font-size: 0.7rem;
    line-height: 1;
    opacity: 0.6;
    transition: opacity 0.15s;
    cursor: pointer;
    padding: 0 0.1rem;
  }

  .preset-delete:hover { opacity: 1; }

  /* Add preset form */
  .add-preset-form {
    background: var(--bg);
    border: 1px solid var(--accent2);
    border-radius: 3px;
    padding: 1rem;
    margin-top: 0.5rem;
    display: none;
  }

  .add-preset-form.visible { display: block; }

  .add-preset-form .form-row {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 0.5rem;
  }

  .add-preset-form input[type="text"] { font-size: 0.85rem; }
  .add-preset-form input[type="number"] { font-size: 0.85rem; }

  .form-actions {
    display: flex;
    gap: 0.5rem;
    justify-content: flex-end;
  }

  .btn-save {
    background: var(--accent);
    border: none;
    border-radius: 2px;
    color: #000;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    padding: 0.4rem 0.8rem;
    text-transform: uppercase;
    transition: opacity 0.15s;
  }

  .btn-save:hover { opacity: 0.85; }

  .btn-cancel {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--muted);
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    padding: 0.4rem 0.8rem;
    text-transform: uppercase;
    transition: all 0.15s;
  }

  .btn-cancel:hover { border-color: var(--muted); color: var(--text); }

  .form-hint {
    font-size: 0.6rem;
    color: var(--muted);
    margin-bottom: 0.6rem;
  }

  /* Result */
  .result-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 1.5rem;
    margin-top: 1.5rem;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.3s, transform 0.3s;
  }

  .result-box.visible { opacity: 1; transform: translateY(0); }

  .result-main {
    display: flex;
    align-items: baseline;
    gap: 0.5rem;
    margin-bottom: 1rem;
  }

  .result-grams {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3.5rem;
    color: var(--accent);
    line-height: 1;
  }

  .result-unit {
    font-size: 0.9rem;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  .result-details {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.5rem;
    border-top: 1px solid var(--border);
    padding-top: 1rem;
  }

  .detail {
    font-size: 0.68rem;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  .detail strong {
    display: block;
    font-size: 0.85rem;
    color: var(--text);
    font-weight: 400;
    margin-top: 0.15rem;
  }

  .tsp-hint {
    font-size: 0.65rem;
    color: var(--accent2);
    letter-spacing: 0.08em;
    margin-top: 0.75rem;
    padding-top: 0.75rem;
    border-top: 1px solid var(--border);
  }

  .no-presets {
    font-size: 0.65rem;
    color: var(--muted);
    font-style: italic;
    padding: 0.3rem 0;
  }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="label-tag">Isaac's</div>
    <h1>i<span>SALT</span></h1>
    <div class="subtitle">Weight → Salinity in grams</div>
  </div>

  <div class="section">
    <label class="field-label">Meat Weight</label>
    <div class="input-row">
      <input type="number" id="weightInput" placeholder="0.00" min="0" step="0.01" oninput="calculate()">
      <div class="toggle">
        <button id="btnLbs" class="active" onclick="setUnit('lbs')">LBS</button>
        <button id="btnKg" onclick="setUnit('kg')">KG</button>
      </div>
    </div>
  </div>

  <div class="section">
    <label class="field-label">Salinity %</label>
    <input type="number" id="salinityInput" placeholder="e.g. 1.2" min="0" max="100" step="0.1" style="width:100%" oninput="onSalinityInput()">

    <div style="margin-top: 0.75rem;">
      <div class="presets-header">
        <span class="presets-label">Presets</span>
        <button class="add-preset-btn" onclick="toggleAddForm()">+ Add Preset</button>
      </div>

      <div class="presets" id="presetsContainer"></div>

      <div class="add-preset-form" id="addPresetForm">
        <div class="form-hint">Name your preset and set the salinity %</div>
        <div class="form-row">
          <input type="text" id="presetName" placeholder="e.g. Pork Chops" maxlength="20">
          <input type="number" id="presetPct" placeholder="%" min="0.1" max="100" step="0.1" style="max-width: 80px; flex: none;">
        </div>
        <div class="form-actions">
          <button class="btn-cancel" onclick="cancelAdd()">Cancel</button>
          <button class="btn-save" onclick="savePreset()">Save</button>
        </div>
      </div>
    </div>
  </div>

  <div class="result-box" id="resultBox">
    <div class="result-main">
      <div class="result-grams" id="saltGrams">—</div>
      <div class="result-unit">grams of salt</div>
    </div>
    <div class="result-details">
      <div class="detail">Weight (kg)<strong id="weightKg">—</strong></div>
      <div class="detail">Weight (lbs)<strong id="weightLbs">—</strong></div>
      <div class="detail">Salinity<strong id="salinityDisplay">—</strong></div>
      <div class="detail">Weight (g)<strong id="weightGrams">—</strong></div>
    </div>
    <div class="tsp-hint" id="tspHint"></div>
  </div>
</div>

<script>
  let unit = 'lbs';
  let activePresetIndex = null;

  function loadPresets() {
    const saved = localStorage.getItem('isalt_presets');
    return saved ? JSON.parse(saved) : [];
  }

  function savePresets(presets) {
    localStorage.setItem('isalt_presets', JSON.stringify(presets));
  }

  function renderPresets() {
    const presets = loadPresets();
    const container = document.getElementById('presetsContainer');
    container.innerHTML = '';

    if (presets.length === 0) {
      container.innerHTML = '<div class="no-presets">No presets yet — add one above.</div>';
      return;
    }

    presets.forEach((p, i) => {
      const btn = document.createElement('button');
      btn.className = 'preset-btn' + (activePresetIndex === i ? ' active-preset' : '');
      btn.innerHTML = `<span onclick="applyPreset(${i})">${p.pct}% ${p.name}</span>`;

      // only user-added presets (index >= DEFAULT_PRESETS.length) get delete
      // Actually let's allow deleting any preset
      const del = document.createElement('span');
      del.className = 'preset-delete';
      del.title = 'Remove';
      del.textContent = '✕';
      del.onclick = (e) => { e.stopPropagation(); deletePreset(i); };
      btn.appendChild(del);

      btn.querySelector('span').onclick = () => applyPreset(i);
      container.appendChild(btn);
    });
  }

  function applyPreset(index) {
    const presets = loadPresets();
    const p = presets[index];
    document.getElementById('salinityInput').value = p.pct;
    activePresetIndex = index;
    renderPresets();
    calculate();
  }

  function deletePreset(index) {
    const presets = loadPresets();
    presets.splice(index, 1);
    savePresets(presets);
    if (activePresetIndex === index) activePresetIndex = null;
    else if (activePresetIndex > index) activePresetIndex--;
    renderPresets();
  }

  function toggleAddForm() {
    const form = document.getElementById('addPresetForm');
    form.classList.toggle('visible');
    if (form.classList.contains('visible')) {
      document.getElementById('presetName').focus();
    }
  }

  function cancelAdd() {
    document.getElementById('addPresetForm').classList.remove('visible');
    document.getElementById('presetName').value = '';
    document.getElementById('presetPct').value = '';
  }

  function savePreset() {
    const name = document.getElementById('presetName').value.trim();
    const pct = parseFloat(document.getElementById('presetPct').value);

    if (!name) { document.getElementById('presetName').focus(); return; }
    if (isNaN(pct) || pct <= 0) { document.getElementById('presetPct').focus(); return; }

    const presets = loadPresets();
    presets.push({ name, pct });
    savePresets(presets);
    cancelAdd();
    renderPresets();
  }

  function onSalinityInput() {
    activePresetIndex = null;
    renderPresets();
    calculate();
  }

  function setUnit(u) {
    unit = u;
    document.getElementById('btnLbs').classList.toggle('active', u === 'lbs');
    document.getElementById('btnKg').classList.toggle('active', u === 'kg');
    calculate();
  }

  function calculate() {
    const weightRaw = parseFloat(document.getElementById('weightInput').value);
    const salinity = parseFloat(document.getElementById('salinityInput').value);
    const box = document.getElementById('resultBox');

    if (isNaN(weightRaw) || weightRaw <= 0 || isNaN(salinity) || salinity <= 0) {
      box.classList.remove('visible');
      return;
    }

    const weightKg = unit === 'lbs' ? weightRaw * 0.453592 : weightRaw;
    const weightLbs = unit === 'kg' ? weightRaw * 2.20462 : weightRaw;
    const weightG = weightKg * 1000;
    const saltG = (salinity / 100) * weightG;
    const tsp = saltG / 6;

    document.getElementById('saltGrams').textContent = saltG.toFixed(1);
    document.getElementById('weightKg').textContent = weightKg.toFixed(3) + ' kg';
    document.getElementById('weightLbs').textContent = weightLbs.toFixed(2) + ' lbs';
    document.getElementById('salinityDisplay').textContent = salinity + '%';
    document.getElementById('weightGrams').textContent = weightG.toFixed(0) + ' g';
    document.getElementById('tspHint').textContent = `≈ ${tsp.toFixed(1)} tsp kosher salt (coarse, ~6g/tsp)`;

    box.classList.add('visible');
  }

  // Allow Enter to save preset
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.getElementById('addPresetForm').classList.contains('visible')) {
      savePreset();
    }
  });

  // Init
  renderPresets();
</script>
</body>
</html>
